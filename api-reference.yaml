openapi_like: true
title: MTG Collection Manager — API Reference
description: >
  Referência das rotas REST da API do MTG Collection Manager, escrita para ser
  consumida por skills/agentes. Não é OpenAPI estrito: é um formato pragmático
  com método, caminho, parâmetros, corpo, resposta e exemplos. Toda a API é local
  e sem autenticação. Respostas são JSON (exceto /export, que é text/plain).
version: 2026-06-13

servers:
  - url: http://localhost:3001
    desc: Dev local (mesma máquina que roda o Docker)
  - url: http://192.168.31.169:3001
    desc: Acesso pela rede LAN (IP da máquina host; vem de DHCP, pode mudar)
base_path: /api   # todas as rotas abaixo são relativas a {server}/api

conventions:
  colors: ["W", "U", "B", "R", "G", "C"]   # C = incolor
  color_fields_format: "VARCHAR separado por vírgula, ex: 'G,U' (sem espaços)"
  color_identity: "Identidade Commander da carta/deck, ex: 'W,U,B'. Usada para filtrar cartas legais no deck."
  board_values: ["main", "side", "maybe", "commander"]
  deck_format_default: commander
  platform_values: ["arena", "mtgo", "physical", "all"]   # decks
  digital_platform_values: ["arena", "mtgo"]               # collection_digital
  rarity_values: ["common", "uncommon", "rare", "mythic", "special", "bonus"]
  mana_cost_format: "Notação Scryfall, ex: '{2}{W}{W}'"
  image_uri: "Pode ser caminho local servido pela UI ('/cards/<scryfall_id>.jpg') ou URL Scryfall."
  error_shape: '{ "error": "mensagem", "detail": "opcional" }'
  notes:
    - "Soft-delete: decks excluídos viram is_active=0 e somem da listagem; não são apagados."
    - "Sync e import são feitos por estes endpoints; não há scripts obrigatórios para uso normal."
    - "FULLTEXT em /api/cards?q= remove operadores BOOLEAN (+ - < > ( ) ~ * \" @) e adiciona '*' (prefixo)."

# ─────────────────────────────────────────────────────────────
# OBJETOS (shapes reutilizados nas respostas)
# ─────────────────────────────────────────────────────────────
objects:

  Card:
    desc: Carta (uma impressão). Campos retornados variam por endpoint; lista dos mais usados.
    fields:
      id: int                      # PK interna — use em deck_cards, tags, coleção
      scryfall_id: string
      arena_id: string|null
      name: string
      mana_cost: string|null       # ex "{1}{W}"
      cmc: number|null
      colors: string|null          # ex "W,U"
      color_identity: string|null  # ex "W,U,B"
      produced_mana: string|null   # cores que a carta gera (terrenos/rocks)
      type_line: string|null       # ex "Legendary Creature — Elf Druid"
      oracle_text: string|null
      keywords: json|null
      power: string|null
      toughness: string|null
      loyalty: string|null
      rarity: string|null
      set_code: string|null
      image_uri: string|null
      edhrec_rank: int|null         # menor = mais popular
      price_usd: number|null
      tags: "string[]"              # nomes das tags (em /api/cards e /api/cards/:id)
      decks: "string[]|object[]"    # decks que contêm a carta
      qty_digital: int              # em /api/cards: soma da coleção digital
      qty_physical: int             # em /api/cards: soma da coleção física

  Deck:
    desc: Deck. /api/decks (lista) traz subset; /api/decks/:id traz tudo + cards + stats + analysis.
    fields:
      id: int
      slug: string
      name: string|null
      format: string                # default 'commander'
      platform: string              # arena|mtgo|physical|all
      commander_id: int|null
      commander_name: string|null
      commander_image: string|null
      commander_color_identity: string|null
      color_identity: string|null
      description: string|null
      is_active: bool
      card_count: int               # só em /api/decks (lista)
      cards: "Card[]"               # só em /api/decks/:id
      grouped: object               # só em /api/decks/:id — { board: { typeGroup: Card[] } }
      stats: DeckStats              # só em /api/decks/:id
      analysis: DeckAnalysis        # só em /api/decks/:id

  DeckStats:
    desc: Estatísticas básicas do main board.
    fields:
      curve: "object"   # { '0':n, '1':n, ... '7+':n } (exclui terrenos)
      colors: "object"  # { W:n, U:n, B:n, R:n, G:n, C:n }
      types: "object"   # { 'Creature':n, 'Instant':n, ... }
      totalPrice: string

  DeckAnalysis:
    desc: >
      Raio-X funcional do deck (Deck Doctor). Gerado por heurística sobre type_line/oracle_text.
      Use para diagnosticar e sugerir melhorias (ramp/draw/removal/wipe baixos, base de mana fraca).
    fields:
      counts: "object"      # { lands, ramp, draw, removal, wipe, counter, tutor } (contagens ponderadas por quantidade)
      template: "object"    # faixas recomendadas { lands:{min,max,label}, ramp:{...}, draw, removal, wipe }
      sources: "object"     # fontes de mana por cor entre os terrenos { W,U,B,R,G }
      pips: "object"        # demanda de símbolos coloridos no custo das cartas não-terreno { W,U,B,R,G }
      colorIdentity: "string[]"
      totalCards: int
      nonland: int
      avgCmc: string
      warnings: "object[]"  # [{ level:'low'|'high', key:'ramp'|'removal'|'source_R'|..., msg:string }]
      byCard: "object"      # { cardId: ['ramp','draw',...] } — papéis funcionais por carta (sem 'land')

  Suggestion:
    desc: Sugestão EDHREC cruzada com a coleção.
    fields:
      name: string
      synergy: number          # 0..1
      inclusion: int
      num_decks: int
      category: string         # ex 'highsynergycards', 'creatures'
      inCollection: bool
      image_uri: string|null   # presente se inCollection
      mana_cost: string|null
      type_line: string|null
      rarity: string|null
      oracle_text: string|null
      power: string|null
      toughness: string|null
      loyalty: string|null

  Tag:
    fields:
      id: int
      name: string             # lowercase, sem '#'
      color: string|null       # hex p/ UI
      is_auto: bool            # true = calculada (staple/meta)
      description: string|null
      card_count: int

# ─────────────────────────────────────────────────────────────
# ENDPOINTS
# ─────────────────────────────────────────────────────────────
endpoints:

  # ---- CARDS ----
  - method: GET
    path: /cards
    summary: Lista/busca cartas com filtros combinados. Resposta inclui tags[], decks[], qty_digital, qty_physical.
    query:
      q: "Busca FULLTEXT (nome/oracle/tipo/flavor). Operadores BOOLEAN são removidos."
      color: "Cores exatas do custo, ex 'W,U' (CSV)."
      tag: "Uma tag (singular)."
      tags: "Várias tags com semântica AND, ex 'ramp,draw'."
      type: "Substring do type_line, ex 'Creature'."
      cmc_min: int
      cmc_max: int
      colorIdentity: "Restringe à identidade do commander, ex 'G,B' (exclui cores fora)."
      owned: "digital | physical — só cartas possuídas nessa coleção."
      sort: "name | cmc | -cmc | price | -price | -edhrec"
      limit: "default 30"
      offset: "default 0"
      meta: "1 → retorna { items: Card[], total: int } p/ paginação (senão retorna Card[])."
    returns: "Card[]  (ou { items, total } se meta=1)"
    examples:
      - 'GET /api/cards?q=counterspell&colorIdentity=U,B&limit=10'
      - 'GET /api/cards?tags=staple&type=Creature&meta=1'
      - 'GET /api/cards?owned=digital&sort=-edhrec'

  - method: GET
    path: /cards/search
    summary: Busca rápida p/ adicionar carta a deck, filtrada por color identity.
    query:
      q: "Termo (>=1 char). Vazio retorna []."
      colorIdentity: "ex 'G,U' — exclui cartas fora da identidade."
      mode: "name (default) | text (busca também no oracle_text)"
    returns: "Card[] (subset: id, name, mana_cost, type_line, image_uri, rarity, oracle_text)"
    example: 'GET /api/cards/search?q=cultivate&colorIdentity=G&mode=name'

  - method: GET
    path: /cards/arena-map
    summary: Mapa arena_id → name (todas as cartas com arena_id).
    returns: '{ "<arena_id>": "Card Name", ... }'

  - method: GET
    path: /cards/{id}
    summary: Carta completa por id interno, com tags[] e decks[] (id, slug, name, board).
    path_params: { id: "cards.id (int)" }
    returns: "Card  (+ tags, decks)"

  - method: POST
    path: /cards/{id}/tags
    summary: Adiciona tag à carta (cria a tag se não existir). Normaliza '#Foo' → 'foo'.
    path_params: { id: "cards.id" }
    body: '{ "name": "staple" }'
    returns: '{ "tags": ["..."] }'

  - method: DELETE
    path: /cards/{id}/tags/{tagName}
    summary: Remove a tag da carta.
    path_params: { id: "cards.id", tagName: "nome da tag (lowercase)" }
    returns: '{ "tags": ["..."] }'

  - method: POST
    path: /cards
    summary: Cria uma carta manualmente (só name é obrigatório). Campos JSON (keywords) aceitam array.
    body: >
      { "name": "Nome", "type_line?": "", "mana_cost?": "{1}{G}", "cmc?": 0, "colors?": "G",
        "color_identity?": "G", "oracle_text?": "", "keywords?": ["Flying"], "rarity?": "common",
        "set_code?": "", "image_uri?": "", "edhrec_rank?": 0, "price_usd?": 0, ... }
    writable_fields: [scryfall_id, oracle_id, arena_id, mtgo_id, name, flavor_name, mana_cost, cmc, colors, color_identity, color_indicator, produced_mana, type_line, oracle_text, keywords, layout, power, toughness, loyalty, set_code, set_name, collector_number, rarity, released_at, lang, image_uri, image_uri_large, edhrec_rank, price_usd, price_eur]
    returns: "Card (201, linha criada completa)"

  - method: PATCH
    path: /cards/{id}
    summary: Edita campos da carta (mesma whitelist do POST /cards).
    path_params: { id: "cards.id" }
    body: '{ "<campo>": <valor>, ... }'
    returns: "Card (linha atualizada) | 404 se não existe"

  - method: DELETE
    path: /cards/{id}
    summary: >
      Remove a carta. card_tags/card_faces/card_legalities caem por cascade.
      Bloqueia (409) se estiver em deck/coleção; use ?force=true para limpar as
      referências (deck_cards, coleções, commander_id) antes de remover.
    path_params: { id: "cards.id" }
    query: { force: "true|1 — remove junto as referências" }
    returns: '{ ok:true, removed:true } | 409 { error, references:{decks,digital,physical} } | 404'

  # ---- TAGS ----
  - method: GET
    path: /tags
    summary: Lista todas as tags com contagem. Auto-tags (is_auto) vêm primeiro.
    returns: "Tag[]"

  - method: POST
    path: /tags/auto
    summary: >
      Recalcula as tags automáticas. Idempotente. 'staple' = edhrec_rank<=1000;
      'meta' = carta presente em 3+ decks ativos (board main/commander).
    body: "(vazio)"
    returns: '{ "ok": true, "tagged": { "staple": <int>, "meta": <int> } }'

  - method: POST
    path: /tags
    summary: Cria uma tag avulsa (sem associar a carta). Normaliza '#Foo' → 'foo'.
    body: '{ "name": "combo", "color?": "#ff0066", "description?": "" }'
    returns: "Tag (201) | 409 { error, id } se já existe"

  - method: PATCH
    path: /tags/{id}
    summary: Renomeia / recoloriza / descreve a tag.
    path_params: { id: "tags.id" }
    body: '{ "name?": "novo-nome", "color?": "#00ccff", "description?": "" }'
    returns: "Tag (atualizada) | 409 se nome colide | 404"

  - method: DELETE
    path: /tags/{id}
    summary: Remove a tag (card_tags cai por cascade). Auto-tags voltam ao rodar POST /tags/auto.
    path_params: { id: "tags.id" }
    returns: '{ ok:true, removed:true } | 404'

  # ---- DECKS ----
  - method: GET
    path: /decks
    summary: Lista de decks ativos com commander e card_count.
    returns: "Deck[] (subset de lista)"

  - method: GET
    path: /decks/{id}
    summary: Deck completo — cards, grouped (por board/tipo), stats e analysis (Deck Doctor).
    path_params: { id: "decks.id (int) ou slug" }
    returns: "Deck (completo)"
    note: "Aceita slug; nesse caso responde via redirect 302 para /api/decks/<id>."

  - method: POST
    path: /decks
    summary: Cria deck vazio.
    body: '{ "slug": "meu-deck", "name": "Meu Deck", "format": "commander", "platform": "arena" }'
    returns: '{ id, slug, name, format, platform }'

  - method: PATCH
    path: /decks/{id}
    summary: Atualiza metadados do deck.
    path_params: { id: "decks.id" }
    body: '{ "name?": "", "slug?": "", "format?": "", "platform?": "", "description?": "" }'
    returns: "Deck (linha atualizada)"

  - method: POST
    path: /decks/{id}/duplicate
    summary: Duplica o deck (com cartas).
    path_params: { id: "decks.id" }
    returns: '{ id, slug, ... }  (novo deck)'

  - method: DELETE
    path: /decks/{id}
    summary: Remove deck (soft delete — is_active=0).
    path_params: { id: "decks.id" }
    returns: '{ ok: true }'

  - method: POST
    path: /decks/import
    summary: >
      Importa deck a partir de texto Arena/Moxfield. Parseia seções
      (Commander/Deck/Sideboard/Maybeboard) e linhas '1 Nome (SET) 123'.
      Cartas não achadas na base são criadas só com nome e listadas em notFound.
    body: '{ "name": "Nome", "slug?": "", "format?": "commander", "platform?": "arena", "text": "<lista>" }'
    returns: '{ deck_id, slug, created, matched, notFound: ["..."] }'

  # ---- DECK CARDS ----
  - method: POST
    path: /decks/{id}/cards
    summary: Adiciona/atualiza carta no deck (upsert por deck+card+board).
    path_params: { id: "decks.id" }
    body: '{ "card_id": <int>, "quantity": 1, "board": "main" }'
    returns: '{ ok: true }'

  - method: PATCH
    path: /decks/{id}/cards/{cardId}
    summary: Altera quantidade/board da carta no deck. quantity=0 remove.
    path_params: { id: "decks.id", cardId: "cards.id" }
    body: '{ "quantity?": <int>, "board?": "main|side|maybe|commander" }'
    returns: '{ ok: true }'

  - method: DELETE
    path: /decks/{id}/cards/{cardId}
    summary: Remove a carta do deck.
    path_params: { id: "decks.id", cardId: "cards.id" }
    returns: '{ ok: true }'

  - method: GET
    path: /decks/{id}/export
    summary: Exporta o deck no formato Arena (text/plain).
    path_params: { id: "decks.id" }
    returns: "text/plain (linhas '1 Nome (SET) 123')"

  - method: GET
    path: /decks/{id}/suggestions
    summary: Sugestões EDHREC para o commander, cruzadas com a coleção (cache 24h).
    path_params: { id: "decks.id" }
    query: { limit: "default 30" }
    returns: '{ suggestions: Suggestion[], total: int, source: "edhrec", slug: string }'

  # ---- COLLECTION ----
  - method: GET
    path: /collection
    summary: Lista cartas da coleção digital ou física.
    query:
      source: "digital (default) | physical"
      q: "filtro por nome (LIKE)"
      limit: "default 50"
      offset: "default 0"
    returns: "Card[] (com col.quantity; +condition/finish se physical, +platform se digital)"

  - method: POST
    path: /collection/physical
    summary: Upsert da coleção física por carta. quantity<=0 remove.
    body: '{ "card_id": <int>, "quantity": 1, "condition": "NM", "finish": "nonfoil", "lang": "en", "notes?": "", "acquired_price?": 0, "acquired_at?": "YYYY-MM-DD" }'
    returns: '{ ok: true }  (ou { ok:true, removed:true })'

  - method: DELETE
    path: /collection/physical/{cardId}
    summary: Remove a carta da coleção física.
    path_params: { cardId: "cards.id" }
    returns: '{ ok: true }'

  - method: POST
    path: /collection/digital
    summary: Upsert da coleção digital (Arena/MTGO) por carta+plataforma. quantity<=0 remove.
    body: '{ "card_id": <int>, "quantity": 1, "platform": "arena" }'
    returns: '{ ok: true }  (ou { ok:true, removed:true })'

  - method: DELETE
    path: /collection/digital/{cardId}
    summary: Remove a carta da coleção digital. Sem platform remove todas as plataformas.
    path_params: { cardId: "cards.id" }
    query: { platform: "arena|mtgo (opcional)" }
    returns: '{ ok: true }'

  # ---- SYNC (Scryfall) ----
  - method: POST
    path: /sync
    summary: Inicia sincronização Scryfall em background.
    body: '{ "mode": "new" | "all" }'   # new = só scryfall_id NULL; all = todas
    returns: '{ started: true, total: int }  (ou resultado imediato p/ new)'

  - method: GET
    path: /sync/progress
    summary: Progresso do job de sync em andamento.
    returns: '{ processed, total, updated, images, errors, done }'

  - method: GET
    path: /sync/status
    summary: Estado da sincronização.
    returns: '{ total, unsynced, oldestSync }'

  # ---- MATCHES (MTGA tracker) ----
  - method: POST
    path: /matches
    summary: >
      Registra início de partida. Tenta detectar o deck por overlap de arena_ids
      (>=80%) com decks arena ativos. Upsert por arena_match_id.
    body: '{ "arena_match_id": "", "opponent_name?": "", "started_at": "ISO", "deck_arena_ids?": [int], "event_name?": "", "commander_name?": "" }'
    returns: '{ id, deck_id }'

  - method: PATCH
    path: /matches/{id}
    summary: Encerra/atualiza resultado da partida.
    path_params: { id: "matches.id" }
    body: '{ "result": "win|loss|draw", "ended_at": "ISO", "total_turns?": int, "on_play?": bool }'
    returns: '{ ok: true }'

  - method: DELETE
    path: /matches/{id}
    summary: Remove uma partida do histórico.
    path_params: { id: "matches.id" }
    returns: '{ ok:true, removed:true } | 404'

  - method: GET
    path: /matches
    summary: Histórico de partidas (join com deck).
    query: { deck_id: "filtra por deck (opcional)", limit: "default 50" }
    returns: "Match[]"

  # ---- SYNC LOG (linhas de progresso do tracker) ----
  - method: POST
    path: /sync-log
    summary: Acrescenta uma linha de log (máx 255 chars).
    body: '{ "message": "..." }'
    returns: '{ id }'

  - method: GET
    path: /sync-log
    summary: Lê linhas de log novas.
    query: { since_id: "retorna id > since_id (default 0), até 200 linhas" }
    returns: "[{ id, created_at, message }]"

  # ---- SCANNER (cartas físicas via câmera) ----
  - method: POST
    path: /scan
    summary: Top 5 cartas mais próximas por dHash (distância de Hamming).
    body: '{ "phash": "<16 hex chars>" }'
    returns: "Card[] (id, name, set_code, set_name, collector_number, image_uri, distance)"

# ─────────────────────────────────────────────────────────────
# RECEITAS PARA SKILLS (fluxos comuns)
# ─────────────────────────────────────────────────────────────
recipes:
  achar_carta_para_deck:
    - "GET /api/cards/search?q=<nome>&colorIdentity=<ci do commander>&mode=name → pega Card.id"
    - "POST /api/decks/{deckId}/cards { card_id, quantity:1, board:'main' }"
  diagnosticar_deck:
    - "GET /api/decks/{id} → use .analysis (counts vs template, warnings, sources vs pips) para apontar o que falta."
  priorizar_sugestoes:
    - "GET /api/decks/{id}/suggestions → ordene por synergy; prefira inCollection=true; complete o que falta com wildcards."
  cartas_fortes_da_colecao:
    - "GET /api/cards?tags=staple (ou tags=meta) → cartas que o usuário já tem e são muito jogadas."
    - "Rode POST /api/tags/auto antes se decks/coleção mudaram, para recalcular staple/meta."
  montar_lista_arena:
    - "GET /api/decks/{id}/export → texto pronto para importar no Arena."
