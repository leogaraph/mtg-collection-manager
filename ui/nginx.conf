server {
    listen 5173;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Headers de hardening. CSP fica de fora de proposito: quebraria fontes/
    # imagens externas (Google Fonts, Scryfall) e exigiria manutencao constante.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Cobre o import grande da colecao do Arena repassado pelo proxy /api abaixo.
    client_max_body_size 30m;

    # Compressão (assets já vêm minificados do Vite)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;

    # Reverse proxy: /api vai para a API interna (mesma rede Docker). Assim a
    # API NAO precisa estar exposta na internet — so esta UI vai pro tunel,
    # e a UI usa caminho relativo (/api), dispensando CORS.
    location /api/ {
        proxy_pass http://api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Imagens de cartas servidas do volume compartilhado (a API/sync grava aqui).
    # Mantém as imagens "ao vivo" sem precisar rebuildar a imagem do nginx.
    location /cards/ {
        alias /cards/;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Bundles com hash no nome → cache longo e imutável
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA: qualquer rota cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
