server {
    listen 5173;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compressão (assets já vêm minificados do Vite)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;

    # Imagens de cartas servidas do volume compartilhado (a API/sync grava aqui).
    # Mantém as imagens "ao vivo" sem precisar rebuildar a imagem do nginx.
    location /cards/ {
        alias /cards/;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Bundles com hash no nome → cache longo e imutável
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA: qualquer rota cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
