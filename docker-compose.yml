services:

  # ── Banco de dados ──────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: ${CONTAINER_PREFIX:-mtg}_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mtg_collection}
      MYSQL_USER: ${MYSQL_USER:-mtg}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      # Named volume (nao bind mount): MySQL 8 nao trava corretamente os
      # arquivos de doublewrite buffer em bind mounts no Windows
      # (erro "Unable to lock ./#ib_16384_0.dblwr error: 11"). Persistencia
      # real e' via backup/restore (db/backup.sh), nao via acesso direto
      # aos arquivos do datadir - ver README "Backup".
      - mysql_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "${DB_PORT:-3306}:3306"
    healthcheck:
      # -h 127.0.0.1 (nao "localhost"): forca TCP em vez do socket Unix,
      # mais robusto entre versoes/imagens do MySQL
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "${MYSQL_USER:-mtg}", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── API Express ─────────────────────────────────────────────
  api:
    build: ./api
    container_name: ${CONTAINER_PREFIX:-mtg}_api
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-mtg}
      DB_PASS: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE:-mtg_collection}
    volumes:
      # Compartilha a pasta de imagens com a UI (sync salva aqui, Vite serve daqui)
      - ./ui/public/cards:/app/public/cards
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      db:
        condition: service_healthy

  # ── UI (build de produção servido por nginx) ────────────────
  # Para desenvolvimento com HMR, use:
  #   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d ui
  ui:
    build: ./ui
    container_name: ${CONTAINER_PREFIX:-mtg}_ui
    restart: unless-stopped
    volumes:
      # Imagens de cartas servidas ao vivo (a API grava aqui no sync)
      - ./ui/public/cards:/cards:ro
    ports:
      - "${UI_PORT:-5173}:5173"
    depends_on:
      - api

volumes:
  mysql_data:
    # Nome explicito (nao o default do Compose, que usa o nome da PASTA do
    # projeto): duas pastas com o mesmo nome base "mtg-collection-manager"
    # em discos/locais diferentes geram o MESMO volume por padrao e podem
    # se sobrescrever mutuamente. Atrelar ao CONTAINER_PREFIX isola cada
    # instalacao de verdade.
    name: ${CONTAINER_PREFIX:-mtg}_mysql_data
